<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050d13" />
    <meta name="description" content="Convite de aniversário do Marcelo" />
    <title>Niver do Marcelo</title>
    <link rel="icon" href="assets/gato.jpg" />
    <link rel="preload" href="vendor/motions/mousey-snake-hip-hop.glb" as="fetch" crossorigin />
    <link rel="preload" href="vendor/motions/mousey-samba-dancing.glb" as="fetch" crossorigin />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="invite-app" aria-live="polite">
      <section class="screen screen-invite is-active" id="inviteScreen" aria-labelledby="invite-title">
        <div class="hero-copy">
          <p class="kicker">Oi, aqui é o Marcelo</p>
          <h1 id="invite-title" class="stack-title invite-title">
            <span class="title-line title-line-voce">Você</span>
            <span class="title-line title-line-vai">vai no meu</span>
            <span class="title-line title-line-aniver">aniver_</span>
            <span class="title-line title-line-sario">sário?</span>
          </h1>
        </div>

        <section class="answer-stage" id="answerStage" aria-label="Confirme sua presença">
          <button class="figma-button yes-button" id="yesButton" type="button">Sim!</button>

          <div class="no-runner" id="noRunner">
            <div class="cat-carrier" aria-hidden="true">
              <img src="assets/gato.jpg" alt="" />
            </div>
            <button class="figma-button no-button" id="noButton" type="button">Não...</button>
          </div>
        </section>

        <p class="date-line">18/07 - 15h - Rufus</p>

        <button class="dance-shortcut" id="danceShortcut" type="button" aria-label="Ver a dancinha">💃</button>
      </section>

      <section class="screen screen-name" id="nameScreen" aria-labelledby="name-title" hidden>
        <h2 id="name-title" class="stack-title name-title">
          <span class="title-line name-line-qual">qual é</span>
          <span class="title-line name-line-nome">seu nome?</span>
        </h2>

        <form class="name-form" id="nameForm" autocomplete="off">
          <label class="name-input-wrap" for="guestName">
            <span class="sr-only">Seu nome</span>
            <input
              class="name-input"
              id="guestName"
              name="guestName"
              type="text"
              inputmode="text"
              autocomplete="name"
              autocapitalize="words"
              placeholder=""
              maxlength="32"
            />
            <span class="input-underline" aria-hidden="true"></span>
            <span class="name-error" id="nameError" role="alert" aria-live="polite"></span>
          </label>

          <button class="figma-button ok-button" id="okButton" type="submit" disabled>OK</button>
        </form>
      </section>

      <section class="screen screen-dance" id="danceScreen" aria-labelledby="dance-title" hidden>
        <div class="dance-placeholder" id="dancePlaceholder">
          <h2 id="dance-title">Aqui vai a gata dançando</h2>
          <div class="dance-stage" id="danceStage" aria-label="Gato 3D dançando samba"></div>
        </div>

        <p class="see-you" id="seeYouText">Te vejo lá</p>
        <button class="figma-button hehe-button" id="heheButton" type="button" hidden>Hehe</button>
      </section>
    </main>

    <script src="supabase-config.js"></script>
    <script src="script.js" defer></script>
    <script src="dance-scene.js" type="module"></script>
  </body>
</html>
