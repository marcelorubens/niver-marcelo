<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050d13" />
    <meta name="description" content="Convite de aniversário do Marcelo" />
    <title>Niver do Marcelo</title>
    <link rel="icon" href="assets/gato.jpg" />
    <link rel="preload" href="vendor/motions/mousey-snake-hip-hop.glb" as="fetch" crossorigin />
    <link rel="preload" href="vendor/motions/mousey-samba-dancing.glb" as="fetch" crossorigin />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone-poster" aria-labelledby="invite-title">
      <section class="hero-copy">
        <p class="kicker">Oi, aqui é o Marcelo</p>
        <h1 id="invite-title">
          <span>Você</span>
          <span>vai no meu</span>
          <span>aniver_</span>
          <span>sário?</span>
        </h1>
      </section>

      <section class="answer-stage" id="answerStage" aria-label="Confirme sua presença">
        <button class="answer-button yes-button" id="yesButton" type="button">Sim!</button>

        <div class="no-runner" id="noRunner">
          <div class="cat-carrier" aria-hidden="true">
            <img src="assets/gato.jpg" alt="" />
            <span class="cat-arm cat-arm-left"></span>
            <span class="cat-arm cat-arm-right"></span>
          </div>
          <button class="answer-button no-button" id="noButton" type="button">Não...</button>
        </div>
      </section>

      <section class="event-details" aria-labelledby="details-title">
        <h2 id="details-title">Onde e quando</h2>
        <p>DATA - HORA - LOCAL</p>
      </section>

      <p class="micro-hint" id="hint" aria-live="polite">Escolha com cuidado.</p>

      <button class="dance-shortcut" id="danceShortcut" type="button" aria-label="Ver a dancinha">💃</button>
    </main>

    <section class="success-scene" id="successScene" role="dialog" aria-modal="true" aria-labelledby="successTitle" hidden>
      <div class="success-copy">
        <p class="kicker">Resposta certa</p>
        <h2 id="successTitle">Oba!</h2>
        <p>Te espero no meu aniversário. O gato já começou o samba.</p>
        <button class="answer-button yes-button close-button" id="closeSuccess" type="button">Voltar</button>
      </div>
      <div class="dance-stage" id="danceStage" aria-label="Gato 3D dançando samba"></div>
    </section>

    <script src="script.js" defer></script>
    <script src="dance-scene.js" type="module"></script>
  </body>
</html>
